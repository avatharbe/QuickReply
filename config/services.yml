services:
    avathar.quickreply.listener:
        class: avathar\quickreply\event\listener
        arguments:
            - '@auth'
            - '@config'
            - '@template'
            - '@user'
            - '@request'
            - '@avathar.quickreply.listener_helper'
        tags:
            - { name: event.listener }

    avathar.quickreply.listener_ajax:
        class: avathar\quickreply\event\listener_ajax
        arguments:
            - '@config'
            - '@template'
            - '@user'
            - '@request'
            - '@avathar.quickreply.ajax_helper'
            - '@avathar.quickreply.listener_helper'
        tags:
            - { name: event.listener }

    avathar.quickreply.listener_cp:
        class: avathar\quickreply\event\listener_cp
        arguments:
            - '@template'
            - '@user'
            - '@avathar.quickreply.cp_helper'
        tags:
            - { name: event.listener }

    avathar.quickreply.ajax_helper:
        class: avathar\quickreply\functions\ajax_helper
        arguments:
            - '@auth'
            - '@config'
            - '@template'
            - '@user'
            - '@dbal.conn'
            - '@content.visibility'
            - '@request'
            - '@template_context'
            - '%core.root_path%'
            - '%core.php_ext%'
            - '@avathar.quickreply.ajax_preview_helper'

    avathar.quickreply.ajax_preview_helper:
        class: avathar\quickreply\functions\ajax_preview_helper
        arguments:
            - '@auth'
            - '@config'
            - '@user'
            - '@request'

    avathar.quickreply.captcha_helper:
        class: avathar\quickreply\functions\captcha_helper
        arguments:
            - '@config'
            - '@template'
            - '@request'
            - '@captcha.factory'

    avathar.quickreply.cp_helper:
        class: avathar\quickreply\functions\cp_helper
        arguments:
            - '@config'
            - '@request'

    avathar.quickreply.form_helper:
        class: avathar\quickreply\functions\form_helper
        arguments:
            - '@auth'
            - '@config'
            - '@template'
            - '@user'
            - '@cache'
            - '@plupload'
            - '@mimetype.guesser'
            - '%core.root_path%'
            - '%core.php_ext%'

    avathar.quickreply.listener_helper:
        class: avathar\quickreply\functions\listener_helper
        arguments:
            - '@auth'
            - '@config'
            - '@template'
            - '@user'
            - '@request'
            - '@avathar.quickreply.captcha_helper'
            - '@avathar.quickreply.form_helper'
            - '@avathar.quickreply.plugins_helper'
            - '@avathar.quickreply.notifications_helper'
            - '%core.root_path%'
            - '%core.php_ext%'

    avathar.quickreply.notifications_helper:
        class: avathar\quickreply\functions\notifications_helper
        arguments:
            - '@auth'
            - '@user'
            - '@notification_manager'

    avathar.quickreply.plugins_helper:
        class: avathar\quickreply\functions\plugins_helper
        arguments:
            - '@auth'
            - '@config'
            - '@user'
            - '@ext.manager'

    avathar.quickreply.notification.type.quicknick:
        class: avathar\quickreply\notification\quicknick
        shared: false # service MUST not be shared for this to work!
        parent: notification.type.quote
        tags:
            - { name: notification.type }
